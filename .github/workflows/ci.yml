name: CI

on:
  push:
    branches: [ "pilot", "main" ]
  pull_request:
    branches: [ "pilot", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies (adsb-adapter)
      run: |
        cd adapters/adsb-dump1090
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest

    - name: Lint with ruff
      run: |
        cd adapters/adsb-dump1090
        ruff check .
